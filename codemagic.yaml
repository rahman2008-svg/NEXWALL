workflows:
  nexwall-studio-x:
    name: "NexWall Studio X Android Build"
    max_build_duration: 60
    instance_type: mac_mini_m2  # or linux_medium / mac_mini for faster builds
    environment:
      java: 17
      # Add NDK if needed: ndk: r26b (check your build.gradle)
      # vars:
      #   - ANDROID_SDK_VERSION: "34"  # example

    cache:
      cache_paths:
        - \~/.gradle/caches
        - \~/.gradle/wrapper

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Grant execute permission
        script: chmod +x gradlew

      - name: Verify Gradle & Environment
        script: ./gradlew --version

      - name: Clean
        script: ./gradlew clean

      # Optional: Run tests
      # - name: Run unit tests
      #   script: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        script: ./gradlew assembleDebug --stacktrace

      - name: Build Release AAB (for Play Store)
        script: |
          ./gradlew bundleRelease --stacktrace
        # Or assembleRelease if you prefer APKs

    artifacts:
      - path: app/build/outputs/**/*.apk
      - path: app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com
      # Google Play publishing (highly recommended)
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT  # Add via Codemagic UI > Environment variables
      #   track: internal  # or alpha/beta/production
      #   package_name: your.package.name