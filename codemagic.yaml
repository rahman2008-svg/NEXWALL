workflows:
  android-nexwall:
    name: NEXWALL Build

    max_build_duration: 60

    environment:
      java: 17

      android_signing:
        - keystore_reference

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew assembleDebug
      - ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
