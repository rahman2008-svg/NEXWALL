
workflows:
nexwall-studio-x:
name: NexWall Studio X Android Build

max_build_duration: 60

environment:
  java: 17

cache:
  cache_paths:
    - ~/.gradle/caches
    - ~/.gradle/wrapper

triggering:
  events:
    - push
    - pull_request

  branch_patterns:
    - pattern: main
      include: true
      source: true

scripts:
  - name: Grant execute permission
    script: |
      chmod +x gradlew

  - name: Verify Gradle Wrapper
    script: |
      ./gradlew --version

  - name: Clean
    script: |
      ./gradlew clean

  - name: Build Debug APK
    script: |
      ./gradlew assembleDebug --stacktrace

artifacts:
  - app/build/outputs/**/*.apk
  - app/build/outputs/**/*.aab
  - app/build/reports/**/*

publishing:
  email:
    recipients:
      - your-email@example.com
    notify:
      success: true
      failure: true