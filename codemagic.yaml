workflows:
  android-release:
    name: NEXWALL Android Release Build

    max_build_duration: 60

    environment:
      java: 17

      # Android SDK setup
      android_signing:
        - keystore_reference

      vars:
        PACKAGE_NAME: "com.aistudio.nexwallstudiox.kdwpzb"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Set permissions
        script: chmod +x gradlew

      - name: Clean project
        script: ./gradlew clean

      - name: Build Debug APK
        script: ./gradlew assembleDebug

      - name: Build Release AAB
        script: ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - "dev@nexvora.com"
