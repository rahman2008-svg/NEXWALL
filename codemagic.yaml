workflows:
  nexwall-studio-x:
    name: "NexWall Studio X Android Build"
    max_build_duration: 60
    instance_type: mac_mini_m2   # Faster builds (you can change to linux_medium if you prefer)

    environment:
      java: 17
      # ndk: r26b                  # Uncomment if your project uses NDK

    cache:
      cache_paths:
        - \~/.gradle/caches
        - \~/.gradle/wrapper

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Grant execute permission
        script: chmod +x gradlew

      - name: Verify Gradle
        script: ./gradlew --version

      - name: Clean project
        script: ./gradlew clean

      - name: Build Debug APK
        script: ./gradlew assembleDebug --stacktrace

      - name: Build Release AAB
        script: ./gradlew bundleRelease --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com