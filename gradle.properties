# JVM memory (IMPORTANT for Termux stability)
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8

# Enable AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Kotlin style
kotlin.code.style=official

# Performance (safe for low-resource environments)
org.gradle.parallel=false
org.gradle.caching=true

# ⚠️ Disable this in Termux (causes many build failures)
org.gradle.configuration-cache=false

# Limit workers (prevents crash in mobile/Termux)
org.gradle.workers.max=2

# Fix Kotlin compiler daemon issues in Termux
kotlin.compiler.execution.strategy=in-process

# Safer for CLI builds
org.gradle.daemon=false
